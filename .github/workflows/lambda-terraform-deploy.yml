name: Deploy Lambda Function

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  AWS_REGION: us-east-1 # Change to your region
  TERRAFORM_VERSION: 1.5.7

jobs:
  package-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Python (optional, for Python linting)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      # Package Lambda function
      - name: Package Lambda function
        run: |
          cd internal/scripts
          bash package_lambda.sh
          cd ../..
          echo "Lambda packaged successfully"
          ls -lh lambda-function.zip

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      # Configure AWS credentials (using OIDC for security)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # Alternative: Use access keys
          # aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # Terraform Init
      - name: Terraform Init
        working-directory: ./internal
        run: terraform init

      # Terraform Validate
      - name: Terraform Validate
        working-directory: ./internal
        run: terraform validate

      # Terraform Format Check
      - name: Terraform Format Check
        working-directory: ./internal
        run: terraform fmt -check -recursive

      # Terraform Plan
      - name: Terraform Plan
        working-directory: ./internal
        run: terraform plan -out=tfplan

      # Upload plan as artifact
      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v3
        with:
          name: tfplan
          path: ./internal/tfplan

      # Terraform Apply (only on push to main, not on PRs)
      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ./internal
        run: |
          terraform apply -auto-approve tfplan
          echo "Lambda deployed successfully"

      # Comment on PR with plan results
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('./internal/tfplan.json', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Terraform Plan\n```\n' + plan + '\n```'
            });

      # Notify on success
      - name: Success Notification
        if: success()
        run: echo "Pipeline completed successfully!"

      # Notify on failure
      - name: Failure Notification
        if: failure()
        run: echo "Pipeline failed. Check logs above."
