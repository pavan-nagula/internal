name: lambda-terraform-pr-plan

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/*.tf"
      - "lambda_src/**"
      - ".github/workflows/**"

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      AWS_REGION: us-east-1
      TF_VAR_environment: dev
      TF_VAR_aws_region: us-east-1

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Package Lambda
        run: |
          mkdir -p build
          cd lambda_src
          zip -r ../build/lambda.zip .

      - name: Configure AWS credentials
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: gha-lambda-terraform-pr-plan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        run: terraform plan -out=tfplan

      - name: Terraform plan skipped notice for forks
        if: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          echo "Plan step skipped for fork pull requests because AWS secrets are unavailable."
